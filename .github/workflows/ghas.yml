name: GitHub Advanced Security Demo

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run a full scan every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results
  actions: read
  pull-requests: write     # Required to post PR coverage comments

jobs:
  # ── 1. CodeQL Static Analysis (SAST) ───────────────────────────────────────
  codeql-analysis:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: codeql-results

      - name: Upload CodeQL SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: codeql-results/
          retention-days: 30

  # ── 2. Dependency Review (SCA) on Pull Requests ────────────────────────────
  dependency-review:
    name: Dependency Review (SCA)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, LGPL-2.0

  # ── 3. Secret Scanning (informational) ────────────────────────────────────
  secret-scanning-notice:
    name: Secret Scanning (auto)
    runs-on: ubuntu-latest
    steps:
      - name: Secret scanning is enabled
        run: |
          echo "✅ GitHub Secret Scanning is enabled for this repository."
          echo "Alerts appear in: Security → Secret scanning alerts"
          echo "Push protection blocks known secret patterns before they land in the repo."

  # ── 4. Tests + Code Coverage ───────────────────────────────────────────────
  test-and-coverage:
    name: Tests & Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test
        env:
          NODE_ENV: test

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      # Write a coverage summary table to the Actions run summary page
      - name: Write coverage summary
        if: always()
        run: |
          SUMMARY="coverage/coverage-summary.json"
          if [ ! -f "$SUMMARY" ]; then
            echo "No coverage summary found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "## 📊 Unit Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Statements | Branches | Functions | Lines |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|----------|-----------|-------|" >> $GITHUB_STEP_SUMMARY

          node -e "
            const data = require('./coverage/coverage-summary.json');
            const files = Object.keys(data).filter(k => k !== 'total');
            files.forEach(f => {
              const d = data[f];
              const name = f.replace(process.cwd() + '/src/', '');
              const pct = v => v.pct + '%';
              console.log('| ' + name + ' | ' + pct(d.statements) + ' | ' + pct(d.branches) + ' | ' + pct(d.functions) + ' | ' + pct(d.lines) + ' |');
            });
            const t = data.total;
            const pct = v => v.pct + '%';
            console.log('| **Total** | **' + pct(t.statements) + '** | **' + pct(t.branches) + '** | **' + pct(t.functions) + '** | **' + pct(t.lines) + '** |');
          " >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          # Warn if total line coverage is below 60%
          LINES=$(node -e "const d = require('./coverage/coverage-summary.json'); console.log(d.total.lines.pct);")
          if (( $(echo "$LINES < 60" | bc -l) )); then
            echo "⚠️ **Coverage warning:** Line coverage is ${LINES}% — below the 60% target." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Coverage:** Line coverage is ${LINES}% — meets the 60% target." >> $GITHUB_STEP_SUMMARY
          fi

      # Post coverage as a comment on pull requests
      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'coverage/coverage-summary.json';

            if (!fs.existsSync(summaryPath)) {
              console.log('No coverage summary found, skipping PR comment.');
              return;
            }

            const data = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const total = data.total;
            const pct = v => `${v.pct}%`;

            const status = total.lines.pct >= 60 ? '✅' : '⚠️';

            let table = `## ${status} Unit Test Coverage Report\n\n`;
            table += `| File | Statements | Branches | Functions | Lines |\n`;
            table += `|------|-----------|----------|-----------|-------|\n`;

            Object.keys(data)
              .filter(k => k !== 'total')
              .forEach(file => {
                const d = data[file];
                const name = file.replace(process.cwd() + '/src/', '');
                table += `| \`${name}\` | ${pct(d.statements)} | ${pct(d.branches)} | ${pct(d.functions)} | ${pct(d.lines)} |\n`;
              });

            table += `| **Total** | **${pct(total.statements)}** | **${pct(total.branches)}** | **${pct(total.functions)}** | **${pct(total.lines)}** |\n`;
            table += `\n> Target: 60% line coverage`;

            // Find and update existing comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('Unit Test Coverage Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: table,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: table,
              });
            }

  # ── 5. Security Summary ────────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [ codeql-analysis, test-and-coverage ]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## GHAS Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL SAST | ${{ needs.codeql-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests & Coverage | ${{ needs.test-and-coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | Automatic (check Security tab) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependabot | Automatic (check Security tab) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 View all alerts in the [Security tab](../../security)" >> $GITHUB_STEP_SUMMARY
